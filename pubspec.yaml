name: agent_pro_ghana
description: "One App. Every Mobile Money Business."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Local storage
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Auth & security
  local_auth: ^2.1.8
  jwt_decoder: ^2.0.1

  # Firebase
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.20
  firebase_analytics: ^10.8.9
  firebase_crashlytics: ^3.4.18
  firebase_storage: ^11.6.9

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.67.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Documents & files
  pdf: ^3.10.8
  printing: ^5.12.0
  excel: ^4.0.2
  share_plus: ^9.0.0
  image_picker: ^1.1.1
  path_provider: ^2.1.3

  # QR codes
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1

  # Device & connectivity
  connectivity_plus: ^6.0.2
  telephony: ^0.2.0
  device_info_plus: ^10.1.0
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  go_router: ^14.1.4
  url_launcher: ^6.3.0
  cached_network_image: ^3.3.1
  collection: ^1.18.0
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  drift_dev: ^2.16.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-Black.ttf
          weight: 900
